# Baked into the WSL2 portable distro on first boot.
#
# Important flags:
#   automount.options=metadata  — required for SQLite flock() over /mnt/<drive>/
#   boot.systemd=false          — slimmer startup; we don't need systemd units
#   user.default=hermes         — UID 1000, see /etc/passwd in the rootfs
#   network.generateHosts=false — avoid touching /etc/hosts on every boot
#   network.generateResolvConf=true — let WSL pick up the host's DNS
#   interop.enabled=true        — required so the launcher can wsl --exec back

[automount]
enabled = true
options = "metadata,uid=1000,gid=1000,umask=022,fmask=000"
mountFsTab = false

[boot]
systemd = false
command = ""

[user]
default = hermes

[network]
generateHosts = false
generateResolvConf = true

[interop]
enabled = true
appendWindowsPath = false
